<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<title>Tasik News</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:12px;
font-size:18px;
}

.card a{
text-decoration:none;
color:#111;
}

.empty{
text-align:center;
padding:50px;
font-size:20px;
color:#666;
}

</style>

</head>

<body>

<header>
Tasik News
</header>

<div class="container" id="news"></div>

<script>

async function loadNews(){

try{

const res = await fetch("./news.json?"+Date.now())
const data = await res.json()

const container = document.getElementById("news")

if(!data || data.length===0){

container.innerHTML = `
<div class="empty">
Berita sedang dibuat... refresh beberapa menit lagi
</div>
`

return

}

data.forEach(n=>{

container.innerHTML += `

<div class="card">

<a href="${n.file}">

<img src="${n.img}">

<h3>${n.title}</h3>

</a>

</div>

`

})

}catch(e){

document.getElementById("news").innerHTML = `
<div class="empty">
Gagal memuat berita
</div>
`

}

}

loadNews()

</script>

</body>
</html>
