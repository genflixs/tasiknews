<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<title>Tasik News</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<meta name="description" content="Portal berita terbaru otomatis Tasik News">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.logo{
font-size:26px;
font-weight:bold;
}

.lang{
margin-top:10px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:12px;
font-size:18px;
}

.card a{
text-decoration:none;
color:#111;
}

footer{
text-align:center;
padding:20px;
color:#666;
}

</style>

</head>

<body>

<header>

<div class="logo">
Tasik News
</div>

<div class="lang">
<div id="google_translate_element"></div>
</div>

</header>

<div class="container" id="news"></div>

<footer>
© Tasik News
</footer>

<script>

async function loadNews(){

const res = await fetch("news.json")
const data = await res.json()

const container=document.getElementById("news")

container.innerHTML=""

data.forEach(n=>{

container.innerHTML+=`

<div class="card">

<a href="${n.file}">

<img src="${n.img}">

<h3>${n.title}</h3>

</a>

</div>

`

})

}

loadNews()

</script>

<script>

function googleTranslateElementInit(){
new google.translate.TranslateElement(
{pageLanguage:'id'},
'google_translate_element'
)
}

</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
